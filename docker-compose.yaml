services:
  airflow:
    image: apache/airflow:2.7.1-python3.10
    environment:
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_DEFAULT_REGION=${AWS_REGION}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - KAGGLE_API_TOKEN=${KAGGLE_API_TOKEN}
      - _AIRFLOW_WWW_USER_USERNAME=admin
      - _AIRFLOW_WWW_USER_PASSWORD=admin123

      - KAGGLE_USERNAME=dummy 
      - KAGGLE_KEY=dummy
    volumes:
      - ./dags:/opt/airflow/dags
      - ./data:/opt/airflow/data
    ports:
      - "8082:8080"
    command: >
      bash -c "pip install kaggle && airflow db migrate \
      && airflow users create --username admin --firstname Fazlan --lastname Harun \
      --role Admin \
      --email admin@example.com \
      --password admin123 || true && airflow standalone"

  dbt:
    build:
      context: .
      dockerfile: Dockerfile.dbt
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_DEFAULT_REGION=${AWS_REGION}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - DBT_PROFILES_DIR=/usr/app/analytics
    volumes:
      - ./analytics:/usr/app/analytics
    working_dir: /usr/app/analytics
    tty: true 
    command: tail -f /dev/null